spring:
  application:
    name: moyeota

  profiles:
    active: dev

  output:
    ansi:
      enabled: always

  mvc:
    problemdetails:
      enabled: false

  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: update
    show-sql: true


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    enabled: true


toss:
  secret-key: ${TOSS_SECRET_KEY}
  base-url: https://api.tosspayments.com
  connect-timeout-seconds: 3
  read-timeout-seconds: 3

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000
  cookie-secure: ${JWT_COOKIE_SECURE:true}

platform:
  fee-rate: "0.10"
