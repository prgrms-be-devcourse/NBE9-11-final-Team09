spring:
  application:
    name: moyeota

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s

  profiles:
    active: dev


  output:
    ansi:
      enabled: always

  sql:
    init:
      mode: always

  mvc:
    problemdetails:
      enabled: false

  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: update
    show-sql: true


  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  api-docs:
    enabled: true


toss:
  secret-key: ${TOSS_SECRET_KEY}
  base-url: https://api.tosspayments.com
  connect-timeout-seconds: 3
  read-timeout-seconds: 3

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000
  cookie-secure: ${JWT_COOKIE_SECURE:true}

platform:
  fee-rate: "0.10"

admin:
  email: ${ADMIN_EMAIL}

app:
  mail:
    retry:
      max-retries: 2
      delay: 500
      multiplier: 2.0
      max-delay: 2000
  cors:
    allowed-origins:
      "http://localhost:3000"

social:
  kakao:
    client-id: ${KAKAO_REST_API_KEY}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me