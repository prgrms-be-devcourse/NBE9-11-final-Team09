<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; color: #333333; margin: 0; padding: 20px; background-color: #f9f9f9; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; border: 1px solid #e0e0e0; }
    .header { border-bottom: 2px solid #7C3AED; padding-bottom: 15px; margin-bottom: 20px; }
    .header h1 { color: #7C3AED; font-size: 24px; margin: 0; }
    .content { margin-bottom: 30px; }
    .info-table { width: 100%; border-collapse: collapse; margin: 20px 0; background-color: #f3f4f6; border-radius: 6px; }
    .info-table td { padding: 12px 15px; border-bottom: 1px solid #e5e7eb; }
    .info-table td.label { font-weight: bold; width: 30%; color: #4b5563; }
    .footer { font-size: 12px; color: #9ca3af; margin-top: 30px; text-align: center; border-top: 1px solid #e5e7eb; padding-top: 15px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Moyeota 취소 안내 📢</h1>
  </div>
  <div class="content">
    <h2>안녕하세요, <span th:text="${nickname}">사용자</span>님.</h2>
    <p>신청하신 펀딩 <strong><span th:text="${fundingTitle}">펀딩 제목</span></strong>이 예기치 못한 사유로 인해 개설자 또는 관리자에 의해 <strong>취소</strong>되었습니다.</p>

    <table class="info-table">
      <tr>
        <td class="label">취소된 펀딩</td>
        <td th:text="${fundingTitle}">펀딩 제목</td>
      </tr>
    </table>

    <p>미리 결제하셨던 예약금 및 보증금은 결제하셨던 수단으로 <strong>자동 전액 환불</strong> 처리되오니 걱정하지 않으셔도 됩니다. 이용에 불편을 드려 대단히 죄송합니다.</p>
  </div>
  <div class="footer">
    본 메일은 발신전용입니다. 관련 문의는 Moyeota 고객센터를 이용해주세요.
  </div>
</div>
</body>
</html>
