<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; color: #333333; margin: 0; padding: 20px; background-color: #f9f9f9; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 8px; border: 1px solid #e0e0e0; }
    .header { border-bottom: 2px solid #DC2626; padding-bottom: 15px; margin-bottom: 20px; }
    .header h1 { color: #DC2626; font-size: 24px; margin: 0; }
    .content { margin-bottom: 30px; }
    .notice-box { background-color: #FEF2F2; border: 1px solid #FCA5A5; padding: 20px; margin: 20px 0; border-radius: 6px; white-space: pre-line; color: #991B1B; font-weight: bold; }
    .btn { display: inline-block; padding: 12px 24px; color: #ffffff !important; background-color: #DC2626; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 15px; }
    .footer { font-size: 12px; color: #9ca3af; margin-top: 30px; text-align: center; border-top: 1px solid #e5e7eb; padding-top: 15px; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Moyeota 긴급 공지 🚨</h1>
  </div>
  <div class="content">
    <h2>안녕하세요, <span th:text="${nickname}">사용자</span>님.</h2>
    <p>신청하신 펀딩 <strong><span th:text="${fundingTitle}">펀딩 제목</span></strong>에 대한 긴급 공지사항이 등록되었습니다. 반드시 내용을 숙지해 주시기 바랍니다.</p>

    <div class="notice-box" th:text="${message}">
    </div>


  </div>
  <div class="footer">
    본 메일은 발신전용입니다. 관련 문의는 Moyeota 고객센터를 이용해주세요.
  </div>
</div>
</body>
</html>
