spring:
  datasource:
    url: jdbc:mysql://${RDS_HOST}:${RDS_PORT}/${RDS_DATABASE}
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: validate

springdoc:
  api-docs:
    enabled: false

logging:
  level:
    root: INFO

app:
  cookie:
    secure: true

  cors:
    allowed-origins:
      "https://www.moyeota.site,https://moyeota.site"

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics