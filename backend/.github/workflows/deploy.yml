name: Deploy to EC2 with Docker

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. JDK 25 세팅하기
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: 3. 스프링 부트 빌드 및 테스트 수행 (★테스트 통과 필수)
        # -x test를 빼버렸기 때문에, 이제 모든 테스트 코드가 실행됩니다.
        # 만약 테스트가 실패하면 빌드가 여기서 멈추고 배포가 중단됩니다!
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: 4. Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 5. EC2용(amd64)으로 Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/team09:latest

      - name: 6. EC2에 SSH 원격 접속 후 도커 컨테이너 실행 (CD)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/team09:latest
            sudo docker stop app || true
            sudo docker rm app || true
            
            # ★기존 3개 환경변수에 메일 관련 환경변수 2개를 추가하여 run 실행!
            sudo docker run -d --name app -p 8080:8080 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e TOSS_SECRET_KEY="${{ secrets.TOSS_SECRET_KEY }}" \
              -e JWT_COOKIE_SECURE="${{ secrets.JWT_COOKIE_SECURE }}" \
              -e MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
              -e MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
              ${{ secrets.DOCKER_USERNAME }}/team09:latest
            
            sudo docker image prune -f