name: CI/CD Pipeline

on:
  push: # 1. 어떤 브랜치든 push가 일어나면 이 워크플로우가 켜집니다!

jobs:
  # [JOB 1] 테스트 단계 (모든 브랜치에서 실행)
  run-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. JDK 25 세팅하기
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: 3. 스프링 부트 테스트 수행 (검증 단계)
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew test

  # [JOB 2] 배포 단계 (★ run-tests가 성공하고, 오직 dev 브랜치일 때만 실행)
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: run-tests # 앞의 run-tests가 무조건 성공해야 이 작업이 시작됩니다.
    if: github.ref == 'refs/heads/dev' # 오직 dev 브랜치일 때만 이 작업을 수행합니다.

    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. JDK 25 세팅하기
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: 3. 스프링 부트 빌드 수행 (★테스트는 이미 했으므로 제외 가능)
        working-directory: backend
        run: |
          chmod +x ./gradlew
          # 앞의 job에서 이미 테스트를 통과했으므로, 여기서는 -x test를 붙여서 
          # 중복 테스트를 생략하고 빌드 시간과 자원을 절약합니다.
          ./gradlew clean build -x test

      - name: 4. Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 5. EC2용(amd64)으로 Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/team09:latest

      - name: 6. EC2에 SSH 원격 접속 후 도커 컨테이너 실행 (CD)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/app
            
            echo "RDS_HOST=${{ secrets.RDS_HOST }}" > .env
            echo "RDS_PORT=${{ secrets.RDS_PORT }}" >> .env
            echo "RDS_DATABASE=${{ secrets.RDS_DATABASE }}" >> .env
            echo "RDS_USERNAME=${{ secrets.RDS_USERNAME }}" >> .env
            echo "RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> .env
            
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_COOKIE_SECURE=${{ secrets.JWT_COOKIE_SECURE }}" >> .env
            echo "TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}" >> .env
            
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            
            echo "KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}" >> .env
            echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}" >> .env
            echo "ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}" >> .env
            
            echo "GRAFANA_ADMIN_USER=${{secrets.GRAFANA_ADMIN_USER}}" >> .env
            echo "GRAFANA_ADMIN_PASSWORD=${{secrets.GRAFANA_ADMIN_PASSWORD}}" >> .env
            
            echo "REDIS_HOST=redis" >> .env
            
            chmod +x deploy.sh
            ./deploy.sh