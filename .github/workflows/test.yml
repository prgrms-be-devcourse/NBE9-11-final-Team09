name: Run Tests on Any Push

# 1. 어떤 브랜치든 push가 일어나면 이 로봇이 켜집니다!
on:
  push:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. JDK 25 세팅하기
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: 3. 스프링 부트 테스트 수행 (검증 단계)
        # 빌드(build)까지 할 필요 없이 오직 'test' 작업만 수행해서 속도를 높입니다.
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew test