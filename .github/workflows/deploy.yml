name: Deploy to EC2 with Docker

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 코드 가져오기
        uses: actions/checkout@v4

      - name: 2. JDK 25 세팅하기
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: 3. 스프링 부트 빌드 및 테스트 수행 (★테스트 통과 필수)
        # -x test를 빼버렸기 때문에, 이제 모든 테스트 코드가 실행됩니다.
        # 만약 테스트가 실패하면 빌드가 여기서 멈추고 배포가 중단됩니다!
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: 4. Docker 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 5. EC2용(amd64)으로 Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/team09:latest

      - name: 6. EC2에 SSH 원격 접속 후 도커 컨테이너 실행 (CD)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/app
            
            # echo 문법을 사용하여 앞의 공백 없이 .env 파일을 한 줄씩 생성합니다.
            # 첫 번째 줄은 '>'를 사용하여 기존 .env 파일 내용을 덮어쓰고(초기화), 
            # 두 번째 줄부터는 '>>'를 사용하여 아래에 내용을 이어 붙입니다.
            echo "RDS_HOST=${{ secrets.RDS_HOST }}" > .env
            echo "RDS_PORT=${{ secrets.RDS_PORT }}" >> .env
            echo "RDS_DATABASE=${{ secrets.RDS_DATABASE }}" >> .env
            echo "RDS_USERNAME=${{ secrets.RDS_USERNAME }}" >> .env
            echo "RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> .env
            
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "JWT_COOKIE_SECURE=${{ secrets.JWT_COOKIE_SECURE }}" >> .env
            echo "TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}" >> .env
            
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            
            echo "REDIS_HOST=redis" >> .env
            
            # 배포 스크립트에 실행 권한을 주고 실행합니다.
            chmod +x deploy.sh
            ./deploy.sh