name: "🐛 버그 수정"
description: "버그 수정 시 사용하는 템플릿입니다."
title: "[BUG] "
labels: ["bug"]

body:

* type: textarea
  id: bug_description
  attributes:
  label: "🚨 버그 내용"
  description: "발생한 버그를 설명해주세요."
  placeholder: "예) 로그인 시 500 에러가 발생합니다."
  validations:
  required: true

- type: textarea
  id: expected
  attributes:
  label: "🎯 기대 결과"
  description: "원래 기대했던 동작을 작성해주세요."
  placeholder: "예) 정상적으로 로그인되어야 합니다."
  validations:
  required: true

- type: textarea
  id: tasks
  attributes:
  label: "✅ 작업 목록"
  description: "수정할 작업을 작성해주세요."
  placeholder: |
  - [ ] 원인 분석
  - [ ] 코드 수정
  - [ ] 테스트 진행
  - [ ] 재발 방지 확인
  validations:
  required: true

- type: textarea
  id: notes
  attributes:
  label: "📝 참고 사항"
  description: "에러 로그, 참고 자료 등을 작성해주세요. (선택)"
  placeholder: "에러 로그, 스택 트레이스, 관련 링크 등"
  validations:
  required: false
