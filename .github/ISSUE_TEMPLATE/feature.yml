name: "✨ 기능 구현"
description: "새로운 기능 구현 시 사용하는 템플릿입니다."
title: "[FEAT] "
labels: ["feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: "📋 작업 내용"
      description: "구현할 기능을 설명해주세요."
      placeholder: "예) 사용자가 로그인할 수 있는 기능을 구현합니다."
    validations:
      required: true

  - type: checkboxes
    id: type
    attributes:
      label: "🔖 작업 유형"
      options:
        - label: "기능 구현"
          required: false
        - label: "버그 수정"
          required: false
        - label: "리팩토링"
          required: false
        - label: "문서 수정"
          required: false

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 목록"
      description: "구현할 세부 작업을 체크리스트로 작성해주세요."
      placeholder: |
        - [ ] Entity 작성
        - [ ] Repository 작성
        - [ ] Service 작성
        - [ ] Controller 작성
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "📝 참고 사항"
      description: "참고할 내용이 있으면 작성해주세요. (선택)"
      placeholder: "관련 API 명세, 참고 문서 링크 등"
    validations:
      required: false
